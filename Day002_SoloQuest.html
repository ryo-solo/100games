<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SOLO QUEST — Day 002</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:100%;min-height:100vh;
  background:#0a0608;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',monospace;
  overflow-x:hidden;overflow-y:auto;user-select:none;-webkit-user-select:none;
}
.header{text-align:center;margin-bottom:10px}
.header .day{color:#c9a368;font-size:11px;letter-spacing:.2em;margin-bottom:4px}
.header h1{color:#ead4aa;font-size:22px;font-weight:900;letter-spacing:.12em}
.header .sub{color:#3a2a1a;font-size:10px;margin-top:3px}
#game-container{
  position:relative;width:360px;height:540px;
  border:1px solid #2a1d22;border-radius:4px;overflow:hidden;
  box-shadow:0 0 60px rgba(201,163,104,.1),0 0 20px rgba(0,0,0,.8);
}
#bg-canvas{
  position:absolute;top:0;left:0;
  filter:blur(2px) brightness(.5) saturate(1.3);
}
#fg-canvas{position:absolute;top:0;left:0}
#hud{position:absolute;top:0;left:0;right:0;pointer-events:none}
.hud-top{
  display:flex;justify-content:space-between;align-items:flex-start;
  padding:10px 14px 18px;
  background:linear-gradient(rgba(10,6,8,.9) 55%,transparent);
}
.hl{color:#c9a368;font-size:9px;letter-spacing:.14em;margin-bottom:3px}
.hv-score{color:#feae34;font-size:20px;font-weight:900;line-height:1}
.hv-floor{color:#ead4aa;font-size:20px;font-weight:900;line-height:1}
.hp-row{display:flex;gap:3px;margin-top:3px}
.pip{width:13px;height:7px;background:#be4a2f;border:1px solid #733e39;border-radius:1px}
.pip.e{background:#2a1218;border-color:#3a1a20}
.hud-bot{
  position:absolute;bottom:0;left:0;right:0;
  padding:16px 14px 8px;
  background:linear-gradient(transparent,rgba(10,6,8,.85));
  display:flex;justify-content:center;pointer-events:none;
}
.hint{color:#2a1a12;font-size:10px;letter-spacing:.04em}
.hint b{color:#4a3020}
#blog{
  position:absolute;bottom:28px;left:0;right:0;text-align:center;
  color:#ead4aa;font-size:11px;letter-spacing:.04em;
  opacity:0;transition:opacity .4s;pointer-events:none;
  text-shadow:0 0 8px rgba(201,163,104,.5);
}
#blog.on{opacity:1}
/* ── overlay ── */
#ov{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:rgba(10,6,8,.94);backdrop-filter:blur(6px);z-index:10;
}
.ot{color:#c9a368;font-size:10px;letter-spacing:.22em;margin-bottom:10px}
.oh{color:#ead4aa;font-size:26px;font-weight:900;margin-bottom:6px;text-align:center;line-height:1.35}
.od{color:#4a3525;font-size:11px;margin-bottom:18px;text-align:center;line-height:2}
.os{color:#feae34;font-size:44px;font-weight:900;margin-bottom:2px}
.ob{color:#c9a368;font-size:12px;margin-bottom:20px}
.btn{
  background:#c9a368;color:#0a0608;border:none;border-radius:3px;
  padding:11px 32px;font-size:13px;font-weight:900;cursor:pointer;
  letter-spacing:.1em;transition:all .18s;font-family:inherit;
  -webkit-tap-highlight-color:transparent;
}
.btn:hover{background:#feae34;transform:scale(1.04)}
.btn-x{
  background:transparent;color:#aaa;border:1px solid #444;
  border-radius:3px;padding:9px 28px;font-size:12px;font-weight:700;
  cursor:pointer;letter-spacing:.08em;margin-top:10px;font-family:inherit;
  -webkit-tap-highlight-color:transparent;
}
.btn-x:hover{background:#111;color:#fff;border-color:#888}
/* ── dpad (mobile) ── */
#dpad{
  position:absolute;bottom:10px;right:10px;
  display:none;
  grid-template-columns:repeat(3,34px);grid-template-rows:repeat(3,34px);gap:3px;
  pointer-events:all;z-index:5;
}
@media(hover:none){#dpad{display:grid}}@media(max-width:420px){html,body{justify-content:flex-start;padding:16px 0 24px}.header{margin-bottom:8px}.footer{margin-top:8px}}
.dp{
  background:rgba(201,163,104,.15);border:1px solid #3a2a1a;
  border-radius:5px;color:#c9a368;font-size:14px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
}
.dp:active{background:rgba(201,163,104,.35)}
.footer{margin-top:10px;color:#2a1d14;font-size:11px;text-align:center;letter-spacing:.06em}
.footer span{color:#4a3520}
</style>
</head>

// ============================================================
// IMAGE LOADING
// ============================================================
const imgs = {};
let loadedCount = 0;
const totalSprites = Object.keys(SPRITES).length;

function loadSprites(cb) {
  Object.entries(SPRITES).forEach(([k,v]) => {
    const img = new Image();
    img.onload = () => { if (++loadedCount === totalSprites) cb(); };
    img.src = v;
    imgs[k] = img;
  });
}

// ============================================================
// CONSTANTS
// ============================================================
const TILE = 32, COLS = 11, ROWS = 15;
const OX = 4, OY = 12; // map offset in canvas
const T = {WALL:0, FLOOR:1, STAIRS:2, CHEST:3, TORCH:4};

// ============================================================
// CANVAS
// ============================================================
const bgC = document.getElementById('bg-canvas'), bgX = bgC.getContext('2d');
const fgC = document.getElementById('fg-canvas'), ctx = fgC.getContext('2d');

// ============================================================
// GAME STATE
// ============================================================
let map=[], rooms=[], enemies=[], particles=[];
let player={x:2,y:2,hp:8,maxHp:8,atk:2,dir:'front',af:0,at:0};
let score=0, floorNum=1, state='menu';
let shakeX=0,shakeY=0,shakeDur=0, torchT=0, tick=0;
let logTimer=null;

// ============================================================
// DUNGEON GENERATION
// ============================================================
function genDungeon(f) {
  map = Array.from({length:ROWS}, ()=>new Array(COLS).fill(T.WALL));
  rooms = [];
  const numRooms = Math.min(3+f, 7);
  for (let a=0; a<200 && rooms.length<numRooms; a++) {
    const rw=4+Math.floor(Math.random()*4), rh=3+Math.floor(Math.random()*3);
    const rx=1+Math.floor(Math.random()*(COLS-rw-2));
    const ry=1+Math.floor(Math.random()*(ROWS-rh-2));
    let ok=true;
    for(const r of rooms)
      if(rx<r.x+r.w+2&&rx+rw+2>r.x&&ry<r.y+r.h+2&&ry+rh+2>r.y){ok=false;break;}
    if(!ok) continue;
    for(let y=ry;y<ry+rh;y++) for(let x=rx;x<rx+rw;x++) map[y][x]=T.FLOOR;
    rooms.push({x:rx,y:ry,w:rw,h:rh,cx:rx+Math.floor(rw/2),cy:ry+Math.floor(rh/2)});
  }
  for(let i=1;i<rooms.length;i++){
    let{cx:ax,cy:ay}=rooms[i-1],{cx:bx,cy:by}=rooms[i];
    while(ax!==bx){map[ay][ax]=T.FLOOR;ax+=ax<bx?1:-1;}
    while(ay!==by){map[ay][ax]=T.FLOOR;ay+=ay<by?1:-1;}
  }
  // torches
  for(const r of rooms){
    const tx=r.x+1+Math.floor(Math.random()*(r.w-2));
    if(r.y>0) map[r.y-1][tx]=T.TORCH;
  }
  // stairs in last room
  const last=rooms[rooms.length-1];
  map[last.cy][last.cx]=T.STAIRS;
  // chests in middle rooms
  for(let i=1;i<rooms.length-1;i++){
    if(Math.random()<.5){
      const r=rooms[i];
      for(let t=0;t<10;t++){
        const cx=r.x+1+Math.floor(Math.random()*(r.w-2));
        const cy=r.y+1+Math.floor(Math.random()*(r.h-2));
        if(map[cy][cx]===T.FLOOR){map[cy][cx]=T.CHEST;break;}
      }
    }
  }
  return rooms[0];
}

function spawnEnemies(f){
  enemies=[];
  for(let ri=1;ri<rooms.length;ri++){
    const r=rooms[ri];
    const cnt=1+Math.floor(Math.random()*2)+(f>2?1:0);
    let placed=0;
    for(let t=0;t<40&&placed<cnt;t++){
      const ex=r.x+1+Math.floor(Math.random()*(r.w-2));
      const ey=r.y+1+Math.floor(Math.random()*(r.h-2));
      if(map[ey][ex]!==T.FLOOR) continue;
      if(enemies.find(e=>e.x===ex&&e.y===ey)) continue;
      const pool=f<=1?['slime']:f<=2?['slime','bat']:['slime','bat','skeleton'];
      const type=pool[Math.floor(Math.random()*pool.length)];
      const s={slime:{hp:3,atk:1},bat:{hp:2,atk:1},skeleton:{hp:5,atk:2}}[type];
      enemies.push({x:ex,y:ey,type,hp:s.hp,maxHp:s.hp,atk:s.atk,af:0,at:0});
      placed++;
    }
  }
}

// ============================================================
// COMBAT / MOVEMENT
// ============================================================
function label(t){return{slime:'スライム',bat:'コウモリ',skeleton:'スケルトン'}[t];}

function tryMove(dx,dy){
  if(state!=='playing') return;
  const nx=player.x+dx, ny=player.y+dy;
  if(nx<0||ny<0||nx>=COLS||ny>=ROWS) return;
  const tile=map[ny][nx];
  if(tile===T.WALL) return;

  // direction
  player.dir = dx>0?'right':dx<0?'left':dy>0?'front':'back';

  // attack enemy
  const ei=enemies.findIndex(e=>e.x===nx&&e.y===ny&&e.hp>0);
  if(ei>=0){
    const e=enemies[ei];
    const dmg=Math.max(1,player.atk);
    e.hp-=dmg;
    burst(OX+e.x*TILE+TILE/2, OY+e.y*TILE+TILE/2,'#ff4433',7);
    shake(7); score+=10;
    if(e.hp<=0){
      burst(OX+e.x*TILE+TILE/2,OY+e.y*TILE+TILE/2,'#feae34',10);
      score+=50; log(label(e.type)+'を倒した！ +50');
    } else {
      log(label(e.type)+'に'+dmg+'ダメージ！');
      const ed=Math.max(1,e.atk);
      player.hp-=ed; renderHP();
      if(player.hp<=0){state='dead';showOver();return;}
    }
    enemyTurn(); return;
  }

  player.x=nx; player.y=ny;

  if(tile===T.STAIRS){
    floorNum++;
    score+=100;
    if(floorNum>5){state='win';showWin();return;}
    log('B'+floorNum+'Fへ！ +100');
    initFloor(floorNum); return;
  }
  if(tile===T.CHEST){
    map[ny][nx]=T.FLOOR;
    const h=2+Math.floor(Math.random()*3);
    player.hp=Math.min(player.maxHp,player.hp+h);
    score+=30;
    burst(OX+nx*TILE+TILE/2,OY+ny*TILE+TILE/2,'#63c74d',10);
    log('宝箱！ HP+'+h+' +30pt'); renderHP();
  }
  enemyTurn();
}

function enemyTurn(){
  for(const e of enemies){
    if(e.hp<=0) continue;
    const dx=player.x-e.x, dy=player.y-e.y;
    if(Math.abs(dx)+Math.abs(dy)>7) continue;
    const moves=[[Math.sign(dx),0],[0,Math.sign(dy)],[-Math.sign(dx),0],[0,-Math.sign(dy)]];
    for(const[mx,my]of moves){
      if(!mx&&!my) continue;
      const nx=e.x+mx, ny=e.y+my;
      if(nx<0||ny<0||nx>=COLS||ny>=ROWS) continue;
      const t=map[ny][nx];
      if(t!==T.FLOOR&&t!==T.STAIRS) continue;
      if(enemies.find(o=>o!==e&&o.hp>0&&o.x===nx&&o.y===ny)) continue;
      if(nx===player.x&&ny===player.y){
        const d=Math.max(1,e.atk);
        player.hp-=d; shake(5);
        burst(OX+player.x*TILE+TILE/2,OY+player.y*TILE+TILE/2,'#ff4433',5);
        log(label(e.type)+'の攻撃！ -'+d+'HP'); renderHP();
        if(player.hp<=0){state='dead';showOver();}
        break;
      }
      e.x=nx; e.y=ny; break;
    }
  }
}

// ============================================================
// PARTICLES
// ============================================================
function burst(px,py,color,n=8){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, s=.8+Math.random()*2.2;
    particles.push({x:px,y:py,vx:Math.cos(a)*s,vy:Math.sin(a)*s-.5,color,life:20+Math.floor(Math.random()*16),maxLife:36});
  }
}

// ============================================================
// DRAWING — BACKGROUND (blurred)
// ============================================================
function drawBG(){
  bgX.fillStyle='#0d0a10'; bgX.fillRect(0,0,360,540);
  for(let y=0;y<ROWS;y++) for(let x=0;x<COLS;x++){
    const t=map[y][x], px=OX+x*TILE, py=OY+y*TILE;
    if(t===T.WALL||t===T.TORCH) continue;
    bgX.fillStyle='#1e1520'; bgX.fillRect(px,py,TILE,TILE);
    // torch glow
    if(t===T.TORCH){
      const flicker=Math.sin(torchT+x*1.7)*5;
      bgX.save(); bgX.globalAlpha=.3;
      bgX.fillStyle='#feae34';
      bgX.beginPath(); bgX.arc(px+TILE/2,py+TILE,24+flicker,0,Math.PI*2); bgX.fill();
      bgX.globalAlpha=.12;
      bgX.beginPath(); bgX.arc(px+TILE/2,py+TILE,40+flicker,0,Math.PI*2); bgX.fill();
      bgX.restore();
    }
  }
}

// ============================================================
// DRAWING — FOREGROUND (sharp)
// ============================================================
function drawTile(t,px,py,tx){
  switch(t){
    case T.WALL:{
      ctx.fillStyle='#181225'; ctx.fillRect(px,py,TILE,TILE);
      ctx.fillStyle='#281c3a'; ctx.fillRect(px,py,TILE,2);
      ctx.fillStyle='#221630'; ctx.fillRect(px,py,2,TILE);
      if((tx+Math.floor(py/TILE))%2===0){
        ctx.fillStyle='#100b1a'; ctx.fillRect(px+TILE/2,py+3,1,TILE-5);
      } else {
        ctx.fillStyle='#100b1a'; ctx.fillRect(px+2,py+TILE/2,TILE-4,1);
      }
      break;
    }
    case T.FLOOR:case T.CHEST:{
      ctx.fillStyle='#1a1218'; ctx.fillRect(px,py,TILE,TILE);
      ctx.fillStyle='#241820'; ctx.fillRect(px+1,py+1,TILE-2,TILE-2);
      ctx.fillStyle='#2e2028'; ctx.fillRect(px+3,py+3,3,2);
      ctx.fillRect(px+TILE-6,py+TILE-5,3,2);
      if(t===T.CHEST){
        // draw chest sprite
        ctx.drawImage(imgs.chest, px+1, py+2, TILE-2, TILE-4);
      }
      break;
    }
    case T.TORCH:{
      ctx.fillStyle='#181225'; ctx.fillRect(px,py,TILE,TILE);
      ctx.drawImage(imgs.torch, px-4, py-12, TILE+8, TILE+16);
      // flame glow on FG
      ctx.save(); ctx.globalAlpha=.18;
      ctx.fillStyle='#feae34';
      ctx.beginPath(); ctx.arc(px+TILE/2,py+2,8,0,Math.PI*2); ctx.fill();
      ctx.restore();
      break;
    }
    case T.STAIRS:{
      ctx.fillStyle='#1a1218'; ctx.fillRect(px,py,TILE,TILE);
      ctx.fillStyle='#241820'; ctx.fillRect(px+1,py+1,TILE-2,TILE-2);
      // glowing portal effect
      const pct=(Math.sin(torchT*1.5)+1)/2;
      ctx.save();
      ctx.globalAlpha=.3+pct*.2;
      const g=ctx.createRadialGradient(px+TILE/2,py+TILE/2,2,px+TILE/2,py+TILE/2,13);
      g.addColorStop(0,'#ffffff'); g.addColorStop(.4,'#80cfff'); g.addColorStop(1,'rgba(100,200,255,0)');
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(px+TILE/2,py+TILE/2,13,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=.8+pct*.2;
      ctx.strokeStyle='#60b8ff'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.arc(px+TILE/2,py+TILE/2,10,0,Math.PI*2); ctx.stroke();
      ctx.restore();
      break;
    }
  }
}

function drawSprite(imgKey, px, py, w, h){
  if(imgs[imgKey] && imgs[imgKey].complete) ctx.drawImage(imgs[imgKey],px,py,w,h);
}

function drawPlayer(){
  const px=OX+player.x*TILE, py=OY+player.y*TILE;
  // shadow
  ctx.save(); ctx.globalAlpha=.25; ctx.fillStyle='#000';
  ctx.beginPath(); ctx.ellipse(px+TILE/2,py+TILE-2,8,3,0,0,Math.PI*2); ctx.fill();
  ctx.restore();
  const key='knight_'+player.dir;
  const ikey=imgs[key]?key:'knight_front';
  ctx.drawImage(imgs[ikey], px-4, py-8, TILE+8, TILE+10);
}

function drawEnemy(e){
  const px=OX+e.x*TILE, py=OY+e.y*TILE;
  const bob=Math.floor(e.af/5)%2;
  // shadow
  ctx.save(); ctx.globalAlpha=.2; ctx.fillStyle='#000';
  ctx.beginPath(); ctx.ellipse(px+TILE/2,py+TILE-2,7,3,0,0,Math.PI*2); ctx.fill();
  ctx.restore();
  // sprite
  ctx.drawImage(imgs[e.type], px-6, py-6+bob, TILE+12, TILE+10);
  // HP bar
  if(e.hp<e.maxHp){
    ctx.fillStyle='#2a0808'; ctx.fillRect(px+2,py-7,TILE-4,4);
    ctx.fillStyle='#be4a2f'; ctx.fillRect(px+2,py-7,Math.ceil((TILE-4)*e.hp/e.maxHp),4);
    ctx.fillStyle='#ff8888'; ctx.fillRect(px+2,py-7,Math.ceil((TILE-4)*e.hp/e.maxHp),1);
  }
}

// ============================================================
// GAME LOOP
// ============================================================
function loop(){
  tick++; torchT+=.06;
  if(shakeDur>0){shakeX=(Math.random()-.5)*4;shakeY=(Math.random()-.5)*4;shakeDur--;}
  else{shakeX=0;shakeY=0;}

  player.at++; if(player.at>3){player.af++;player.at=0;}
  for(const e of enemies){e.at++;if(e.at>5){e.af++;e.at=0;}}

  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx; p.y+=p.vy; p.vy+=.12; p.vx*=.93;
    if(--p.life<=0) particles.splice(i,1);
  }

  if(state==='playing'){
    if(tick%4===0) drawBG();
    ctx.clearRect(0,0,360,540);
    ctx.save(); ctx.translate(shakeX,shakeY);

    for(let y=0;y<ROWS;y++) for(let x=0;x<COLS;x++)
      drawTile(map[y][x], OX+x*TILE, OY+y*TILE, x);

    for(const p of particles){
      ctx.globalAlpha=p.life/p.maxLife*.9;
      ctx.fillStyle=p.color; ctx.fillRect(p.x-1,p.y-1,3,3);
    }
    ctx.globalAlpha=1;

    for(const e of enemies){if(e.hp>0) drawEnemy(e);}
    drawPlayer();
    ctx.restore();
    document.getElementById('sc').textContent=score;
  }
  requestAnimationFrame(loop);
}

// ============================================================
// UI
// ============================================================
function renderHP(){
  const el=document.getElementById('hp-pips');
  el.innerHTML='';
  for(let i=0;i<player.maxHp;i++){
    const d=document.createElement('div');
    d.className='pip'+(i<player.hp?'':' e');
    el.appendChild(d);
  }
}
function floorUI(){document.getElementById('fl').textContent='B'+floorNum;}

let lc=null;
function log(msg){
  const el=document.getElementById('blog');
  el.textContent=msg; el.classList.add('on');
  if(lc) clearTimeout(lc);
  lc=setTimeout(()=>el.classList.remove('on'),2200);
}
function shake(d){shakeDur=d;}

// ============================================================
// SHARE
// ============================================================
function shareX(){
  const text=`Day002 SOLO QUEST — スコア${score}pts! B${floorNum}Fまで到達！\nターン制ダンジョン、あなたは何階まで行ける？\n#100日ゲームチャレンジ #solodev`;
  const url='https://ryo-solo.github.io/100games/Day002_SoloQuest.html';
  window.open('https://x.com/intent/tweet?text='+encodeURIComponent(text)+'&url='+encodeURIComponent(url),'_blank');
}

// ============================================================
// SCREENS
// ============================================================
function showOver(){
  const o=document.getElementById('ov'); o.style.display='flex';
  o.innerHTML=`
    <div class="ot">GAME OVER</div>
    <div class="oh" style="color:#be4a2f">力尽きた…</div>
    <div class="os">${score}</div>
    <div class="ob">最深フロア : B${floorNum}F</div>
    <button class="btn" onclick="resetGame()">もう一度</button>
    <button class="btn-x" onclick="shareX()">𝕏 スコアをシェア</button>`;
}
function showWin(){
  const o=document.getElementById('ov'); o.style.display='flex';
  o.innerHTML=`
    <div class="ot">DUNGEON CLEAR！</div>
    <div class="oh" style="color:#feae34">迷宮を制覇した！</div>
    <div class="os">${score}</div>
    <div class="ob">全5フロア踏破 ✦ 真の冒険者</div>
    <button class="btn" onclick="resetGame()">もう一度</button>
    <button class="btn-x" onclick="shareX()">𝕏 スコアをシェア</button>`;
}

// ============================================================
// INIT
// ============================================================
function initFloor(f){
  const start=genDungeon(f);
  player.x=start.cx; player.y=start.cy;
  player.dir='front';
  spawnEnemies(f);
  particles=[];
  floorUI(); drawBG();
}
function startGame(){
  document.getElementById('ov').style.display='none';
  state='playing'; floorNum=1; score=0;
  player.hp=player.maxHp; player.af=0; player.at=0;
  renderHP(); initFloor(1);
  document.getElementById('sc').textContent='0';
}
function resetGame(){startGame();}

// ============================================================
// INPUT
// ============================================================
document.addEventListener('keydown',e=>{
  const m={ArrowUp:'u',ArrowDown:'d',ArrowLeft:'l',ArrowRight:'r',
           w:'u',W:'u',s:'d',S:'d',a:'l',A:'l',d:'r',D:'r'};
  const dir=m[e.key]; if(!dir) return;
  if(e.key.startsWith('Arrow')) e.preventDefault();
  if(dir==='u') tryMove(0,-1);
  else if(dir==='d') tryMove(0,1);
  else if(dir==='l') tryMove(-1,0);
  else tryMove(1,0);
});

let tx0=0,ty0=0;
document.addEventListener('touchstart',e=>{if(e.target.closest('button')){return;}tx0=e.touches[0].clientX;ty0=e.touches[0].clientY;e.preventDefault();},{passive:false});
document.addEventListener('touchend',e=>{if(e.target.closest('button')){return;}
  if(state==='menu'){startGame();return;}
  const dx=e.changedTouches[0].clientX-tx0, dy=e.changedTouches[0].clientY-ty0;
  if(Math.abs(dx)<8&&Math.abs(dy)<8) return;
  if(Math.abs(dx)>Math.abs(dy)) tryMove(dx>0?1:-1,0);
  else tryMove(0,dy>0?1:-1);
  e.preventDefault();
},{passive:false});

document.getElementById('du').addEventListener('click',()=>tryMove(0,-1));
document.getElementById('dd').addEventListener('click',()=>tryMove(0,1));
document.getElementById('dl').addEventListener('click',()=>tryMove(-1,0));
document.getElementById('dr').addEventListener('click',()=>tryMove(1,0));

// ============================================================
// BOOT
// ============================================================
loadSprites(()=>{
  genDungeon(1); drawBG();
  requestAnimationFrame(loop);
});
</script>
