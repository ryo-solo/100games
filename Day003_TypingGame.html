<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TYPE STRIKE — Day 003</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:100%;min-height:100vh;
  background:#0a0608;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',monospace;
  color:#fff;
  overflow-x:hidden;overflow-y:auto;
  user-select:none;-webkit-user-select:none;
  -webkit-tap-highlight-color:transparent;
}
#game-wrap{
  position:relative;
  width:360px;height:540px;
  background:#0d0d1a;
  border:1px solid #1a1a2e;
  border-radius:4px;
  box-shadow:0 0 60px rgba(34,211,238,.08),0 0 20px rgba(0,0,0,.8);
  overflow:hidden;
  display:flex;flex-direction:column;
}
/* HUD */
#hud{
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 14px 8px;
  background:linear-gradient(rgba(10,6,8,.9)55%,transparent);
  position:relative;z-index:10;
}
.hud-day{color:#22d3ee;font-size:9px;letter-spacing:.15em;font-weight:700}
#score-display{font-size:20px;font-weight:900;color:#fff;line-height:1}
#combo-display{
  font-size:11px;font-weight:700;color:#fbbf24;
  transition:transform .15s;
  min-width:48px;text-align:right;
}
#combo-display.pop{transform:scale(1.6)}

/* TIMER BAR */
#timer-track{height:3px;background:#1a1a2e;}
#timer-bar{
  height:100%;background:#22d3ee;
  transition:width .1s linear, background .3s;
  width:100%;
}

/* WORD AREA */
#word-area{
  flex:1;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:16px 24px;
  position:relative;
}
#word-counter{font-size:9px;color:#333;letter-spacing:.2em;margin-bottom:12px}

/* ひらがな表示（大） */
#word-jp{
  font-size:38px;font-weight:900;
  font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;
  letter-spacing:.1em;text-align:center;
  color:#fff;line-height:1.2;
  min-height:52px;margin-bottom:14px;
  transition:opacity .1s;
}

/* ローマ字表示（タイプ対象） */
#word-display{
  font-size:22px;font-weight:900;letter-spacing:.12em;
  font-family:'Courier New',Courier,monospace;
  text-align:center;min-height:36px;
  display:flex;flex-wrap:wrap;justify-content:center;align-items:center;gap:1px;
}
.letter{
  display:inline-block;
  transition:color .06s;
}
.letter.done{
  color:#4ade80;text-shadow:0 0 10px #4ade80;
}
.letter.done.pop{
  animation:letter-pop .22s ease-out;
}
.letter.active{
  color:#fff;text-shadow:0 0 18px rgba(255,255,255,.9);
  animation:cursor-blink .7s ease-in-out infinite;
}
.letter.pending{color:#2a2a3a}
.letter.wrong{color:#f87171;text-shadow:0 0 12px #f87171;animation:shake-letter .2s}

@keyframes letter-pop{
  0%{transform:scale(1);color:#4ade80}
  35%{transform:scale(1.6);color:#fff;text-shadow:0 0 24px #4ade80}
  100%{transform:scale(1);color:#4ade80}
}
@keyframes cursor-blink{
  0%,100%{opacity:1}50%{opacity:.4}
}

#category-badge{
  font-size:10px;color:#4f46e5;letter-spacing:.15em;font-weight:700;
  margin-top:14px;background:rgba(79,70,229,.1);
  border:1px solid rgba(79,70,229,.2);
  padding:3px 10px;border-radius:3px;
}
#difficulty-badge{
  position:absolute;top:12px;right:14px;
  font-size:9px;font-weight:700;letter-spacing:.1em;color:#6b7280;
}

/* INPUT */
#input-area{padding:12px 16px 16px;background:linear-gradient(transparent,rgba(10,6,8,.95) 40%);}
#typing-input{
  width:100%;background:rgba(255,255,255,.04);
  border:1px solid #1e1e3a;border-radius:6px;
  padding:12px 16px;
  font-size:18px;font-family:'Courier New',Courier,monospace;font-weight:700;
  color:#22d3ee;outline:none;caret-color:#22d3ee;
  transition:border-color .2s,box-shadow .2s;
  -webkit-appearance:none;
}
#typing-input:focus{
  border-color:#22d3ee;
  box-shadow:0 0 0 2px rgba(34,211,238,.15),0 0 20px rgba(34,211,238,.08);
}
#typing-input.wrong-input{
  border-color:#f87171;
  box-shadow:0 0 0 2px rgba(248,113,113,.2);
  animation:shake .25s;
}

/* FOOTER */
#game-footer{text-align:center;padding:6px;font-size:9px;color:#1e1e2e;letter-spacing:.08em}

/* SCREENS */
.screen{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:24px;z-index:100;background:#0d0d1a;
}
/* Title */
.ts-day{font-size:10px;color:#22d3ee;letter-spacing:.2em;font-weight:700;margin-bottom:12px}
.ts-title{
  font-size:36px;font-weight:900;letter-spacing:.05em;margin-bottom:6px;
  background:linear-gradient(135deg,#22d3ee,#818cf8);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.ts-sub{font-size:11px;color:#555;letter-spacing:.1em;margin-bottom:24px}
.ts-desc{font-size:12px;color:#6b7280;line-height:2.1;text-align:center;margin-bottom:28px}
.ts-desc span{color:#22d3ee;font-weight:700}
.ts-desc .romaji-hint{
  font-size:11px;color:#4f46e5;font-family:monospace;
  background:rgba(79,70,229,.08);border:1px solid rgba(79,70,229,.2);
  padding:6px 12px;border-radius:4px;display:block;margin-top:6px;letter-spacing:.1em;
}
.btn-start{
  padding:14px 40px;
  background:linear-gradient(135deg,#22d3ee,#818cf8);
  border:none;border-radius:6px;
  font-size:14px;font-weight:900;letter-spacing:.1em;
  color:#0a0608;cursor:pointer;
  transition:transform .15s;
  -webkit-appearance:none;
}
.btn-start:active{transform:scale(.96)}
.ts-footer{margin-top:20px;font-size:10px;color:#222;letter-spacing:.08em}

/* Game Over */
.go-label{font-size:10px;color:#f87171;letter-spacing:.2em;font-weight:700;margin-bottom:16px}
.go-title{font-size:28px;font-weight:900;margin-bottom:24px}
.go-score{font-size:48px;font-weight:900;color:#22d3ee;line-height:1;margin-bottom:6px}
.go-score-label{font-size:10px;color:#555;letter-spacing:.15em;margin-bottom:20px}
.go-stats{display:flex;gap:24px;margin-bottom:28px}
.go-stat{text-align:center}
.go-stat-num{font-size:22px;font-weight:900}
.go-stat-label{font-size:9px;color:#555;margin-top:2px;letter-spacing:.1em}
.best-combo .go-stat-num{color:#fbbf24}
.words-typed .go-stat-num{color:#4ade80}
.btn-retry{
  width:100%;padding:12px;
  background:linear-gradient(135deg,#22d3ee,#818cf8);
  border:none;border-radius:6px;
  font-size:12px;font-weight:900;color:#0a0608;
  cursor:pointer;margin-bottom:10px;
  -webkit-appearance:none;
}
.btn-retry:active{opacity:.85}
.btn-share{
  width:100%;padding:12px;
  background:#000;border:1px solid #333;border-radius:6px;
  font-size:12px;font-weight:700;color:#fff;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;
  -webkit-appearance:none;
}
.btn-share:active{background:#111}

/* PARTICLES */
#particle-layer{position:absolute;inset:0;pointer-events:none;z-index:50;overflow:hidden;}
.particle{
  position:absolute;border-radius:50%;pointer-events:none;
  animation:particle-fly .6s ease-out forwards;
}
@keyframes particle-fly{
  0%{opacity:1;transform:translate(0,0) scale(1)}
  100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(0)}
}

/* FLASH */
#flash-overlay{position:absolute;inset:0;pointer-events:none;z-index:60;opacity:0;transition:opacity .15s;}
#flash-overlay.active{opacity:1;transition:none}

/* COMBO POPUP */
#combo-popup{
  position:absolute;font-size:28px;font-weight:900;
  pointer-events:none;z-index:70;opacity:0;
  text-shadow:0 0 20px currentColor;
}
@keyframes combo-rise{
  0%{opacity:1;transform:translateY(0) scale(.8)}
  40%{opacity:1;transform:translateY(-20px) scale(1.2)}
  100%{opacity:0;transform:translateY(-50px) scale(1)}
}

/* ANIMATIONS */
@keyframes shake{
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-8px)}40%{transform:translateX(8px)}
  60%{transform:translateX(-5px)}80%{transform:translateX(5px)}
}
@keyframes shake-letter{
  0%,100%{transform:translateX(0)}
  30%{transform:translateX(-4px)}60%{transform:translateX(4px)}
}
@keyframes word-in{
  from{opacity:0;transform:translateY(-14px) scale(.93)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
#word-jp.word-enter{animation:word-in .22s ease-out}

@media(max-width:420px){
  html,body{justify-content:flex-start;padding:16px 0 24px}
  #game-wrap{width:100%;height:auto;min-height:540px;border-left:none;border-right:none;border-radius:0}
  #word-jp{font-size:32px}
  #word-display{font-size:19px}
}
</style>
</head>
<body>

<div id="game-wrap">

  <!-- TITLE SCREEN -->
  <div class="screen" id="title-screen">
    <div class="ts-day">DAY 003 / 100</div>
    <div class="ts-title">TYPE STRIKE</div>
    <div class="ts-sub">JAPANESE TYPING CHALLENGE</div>
    <div class="ts-desc">
      日本語の単語をローマ字でタイプ<br>
      コンボで<span>スコア爆増</span> 💥<br>
      <span>BOSS</span> は3倍スコア ⚡
      <span class="romaji-hint">がんばれ → ganbare</span>
    </div>
    <button class="btn-start" id="btn-start">► START</button>
    <div class="ts-footer">ryo-solo.github.io/100games</div>
  </div>

  <!-- GAME OVER SCREEN -->
  <div class="screen" id="gameover-screen" style="display:none">
    <div class="go-label">— GAME OVER —</div>
    <div class="go-title">結果発表</div>
    <div class="go-score" id="go-score">0</div>
    <div class="go-score-label">TOTAL SCORE</div>
    <div class="go-stats">
      <div class="go-stat words-typed">
        <div class="go-stat-num" id="go-words">0</div>
        <div class="go-stat-label">WORDS</div>
      </div>
      <div class="go-stat best-combo">
        <div class="go-stat-num" id="go-combo">0x</div>
        <div class="go-stat-label">BEST COMBO</div>
      </div>
      <div class="go-stat">
        <div class="go-stat-num" id="go-level">1</div>
        <div class="go-stat-label">MAX LEVEL</div>
      </div>
    </div>
    <button class="btn-retry" id="btn-retry">もう一度</button>
    <button class="btn-share" id="btn-share">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.746l7.73-8.835L1.254 2.25H8.08l4.259 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
      𝕏 スコアをシェア
    </button>
  </div>

  <!-- HUD -->
  <div id="hud">
    <div>
      <div class="hud-day">DAY 003 / TYPE STRIKE</div>
      <div id="score-display">0</div>
    </div>
    <div id="combo-display">1x COMBO</div>
  </div>

  <!-- TIMER -->
  <div id="timer-track"><div id="timer-bar"></div></div>

  <!-- WORD AREA -->
  <div id="word-area">
    <div id="word-counter">WORD 1 / ∞</div>
    <div id="word-jp"></div>
    <div id="word-display"></div>
    <div id="category-badge">LOADING</div>
    <div id="difficulty-badge">LV 1</div>
  </div>

  <!-- INPUT -->
  <div id="input-area">
    <input type="text" id="typing-input"
      autocomplete="off" autocorrect="off" autocapitalize="none"
      spellcheck="false"
      placeholder="ローマ字でタイプ..."
      style="display:none">
  </div>

  <!-- FOOTER -->
  <div id="game-footer">ryo-solo.github.io/100games</div>

  <!-- LAYERS -->
  <div id="particle-layer"></div>
  <div id="flash-overlay"></div>
  <div id="combo-popup"></div>
</div>

<script>
// ==================== WORD LIST ====================
// w: 表示する日本語, r: タイプするローマ字, c: カテゴリ
const WORDS = [
  // やる気
  {w:'がんばれ',         r:'ganbare',           c:'やる気'},
  {w:'まいにち',         r:'mainichi',           c:'やる気'},
  {w:'つよくなれ',       r:'tsuyokunare',        c:'やる気'},
  {w:'ちょうせん',       r:'chousen',            c:'やる気'},
  {w:'あきらめるな',     r:'akirameruna',        c:'やる気'},
  {w:'うごく',           r:'ugoku',              c:'やる気'},
  {w:'めざせ',           r:'mezase',             c:'やる気'},
  {w:'たのしもう',       r:'tanoshimou',         c:'やる気'},
  {w:'いまやれ',         r:'imayare',            c:'やる気'},
  {w:'まえにすすめ',     r:'maenisusume',        c:'やる気'},
  // ソロ
  {w:'じゆう',           r:'jiyuu',              c:'ソロ'},
  {w:'しごと',           r:'shigoto',            c:'ソロ'},
  {w:'もくひょう',       r:'mokuhyou',           c:'ソロ'},
  {w:'ふくぎょう',       r:'fukugyou',           c:'ソロ'},
  {w:'じどうか',         r:'jidouka',            c:'ソロ'},
  {w:'しゅうにゅう',     r:'shuunyuu',           c:'ソロ'},
  {w:'でじたる',         r:'dejitaru',           c:'ソロ'},
  {w:'せいちょう',       r:'seichou',            c:'ソロ'},
  {w:'どくりつ',         r:'dokuritsu',          c:'ソロ'},
  {w:'みらい',           r:'mirai',              c:'ソロ'},
  // テック
  {w:'くろうど',         r:'kuroudo',            c:'テック'},
  {w:'ぷろぐらむ',       r:'puroguramu',         c:'テック'},
  {w:'でぷろい',         r:'depuroi',            c:'テック'},
  {w:'こみっと',         r:'komitto',            c:'テック'},
  {w:'でばっぐ',         r:'debaggu',            c:'テック'},
  {w:'えいあい',         r:'eiai',               c:'テック'},
  {w:'きかいがくしゅう', r:'kikaigakushuu',      c:'テック'},
  {w:'ぎっとはぶ',       r:'gittohabu',          c:'テック'},
  // BOSS
  {w:'ひゃくにちちゃれんじ',   r:'hyakunichichalennji',      c:'BOSS'},
  {w:'まいにちあたらしいげーむ',r:'mainichiatarashiigemu',    c:'BOSS'},
  {w:'くろうどがぜんぶつくった',r:'kuroudogazenbutotsukutta', c:'BOSS'},
  {w:'じどうかでじゆうになる',  r:'jidoukadejiyuuninaru',     c:'BOSS'},
  {w:'そろではたらくひとりで',  r:'sorodehatarakuhitoride',   c:'BOSS'},
  {w:'あいとともにせいちょうする',r:'aitotomoniseichousuru',   c:'BOSS'},
];

const BOSS_MULT = 3;
const COMBO_THRESHOLDS = [1,2,3,5,10,15,20];
const COMBO_COLORS = ['#9ca3af','#22d3ee','#4ade80','#fbbf24','#f97316','#a78bfa','#f87171'];
const COMBO_LABELS = ['1x','2x','3x','5x','10x','15x','20x'];
const BASE_TIME = 3000;
const TIME_PER_CHAR = 260; // ローマ字は速く打てる
const LEVEL_UP_EVERY = 5;
const TIME_ACCEL = 0.90;

// ==================== STATE ====================
let state = 'title';
let score = 0, combo = 0, bestCombo = 0, wordsTyped = 0, level = 1;
let currentWord = '', currentJp = '', currentIdx = 0;
let timerMs = 0, timerMax = 0, timerRAF = null, lastTimestamp = null;
let usedWords = [];

// ==================== DOM ====================
const $score    = document.getElementById('score-display');
const $combo    = document.getElementById('combo-display');
const $wordJp   = document.getElementById('word-jp');
const $wordDisp = document.getElementById('word-display');
const $counter  = document.getElementById('word-counter');
const $catBadge = document.getElementById('category-badge');
const $diffBadge= document.getElementById('difficulty-badge');
const $timerBar = document.getElementById('timer-bar');
const $input    = document.getElementById('typing-input');
const $flash    = document.getElementById('flash-overlay');
const $parts    = document.getElementById('particle-layer');
const $comboPop = document.getElementById('combo-popup');
const $titleScr = document.getElementById('title-screen');
const $overScr  = document.getElementById('gameover-screen');

// ==================== COMBO ====================
function getComboTier(c){ for(let i=COMBO_THRESHOLDS.length-1;i>=0;i--) if(c>=COMBO_THRESHOLDS[i]) return i; return 0; }
function getComboMult(c){ return COMBO_THRESHOLDS[getComboTier(c)]; }
function getComboColor(c){ return COMBO_COLORS[getComboTier(c)]; }
function getComboLabel(c){ return COMBO_LABELS[getComboTier(c)]+' COMBO'; }

// ==================== WORD PICK ====================
function pickWord(){
  let pool = (wordsTyped>0 && wordsTyped%6===0)
    ? WORDS.filter(w=>w.c==='BOSS')
    : WORDS.filter(w=>w.c!=='BOSS'||Math.random()<.15);
  const recent = usedWords.slice(-5);
  const fresh = pool.filter(w=>!recent.includes(w.w));
  const src = fresh.length>0 ? fresh : pool;
  return src[Math.floor(Math.random()*src.length)];
}

// ==================== RENDER (ローマ字) ====================
function renderWord(romaji, typed){
  $wordDisp.innerHTML='';
  for(let i=0;i<romaji.length;i++){
    const s=document.createElement('span');
    s.className='letter';
    s.textContent=romaji[i];
    if(i<typed) s.classList.add('done');
    else if(i===typed) s.classList.add('active');
    else s.classList.add('pending');
    $wordDisp.appendChild(s);
  }
}

// 1文字確定ごとにポップアニメ
function popLetter(idx){
  const letters=$wordDisp.querySelectorAll('.letter');
  if(!letters[idx]) return;
  letters[idx].classList.remove('pop');
  void letters[idx].offsetWidth;
  letters[idx].classList.add('pop');
}

// ==================== PARTICLES ====================
function spawnParticles(color,count=8){
  const rect=$wordDisp.getBoundingClientRect();
  const wrapRect=document.getElementById('game-wrap').getBoundingClientRect();
  const cx=rect.left-wrapRect.left+rect.width/2;
  const cy=rect.top-wrapRect.top+rect.height/2;
  for(let i=0;i<count;i++){
    const p=document.createElement('div');
    p.className='particle';
    const angle=(Math.PI*2/count)*i+Math.random()*.5;
    const dist=30+Math.random()*50;
    const size=4+Math.random()*5;
    p.style.cssText=`left:${cx}px;top:${cy}px;width:${size}px;height:${size}px;background:${color};--dx:${Math.cos(angle)*dist}px;--dy:${Math.sin(angle)*dist}px;box-shadow:0 0 ${size*2}px ${color};`;
    $parts.appendChild(p);
    setTimeout(()=>p.remove(),650);
  }
}

// ==================== EFFECTS ====================
function flashScreen(color){
  $flash.style.background=color;
  $flash.classList.add('active');
  setTimeout(()=>$flash.classList.remove('active'),80);
}
function showComboPopup(text,color){
  $comboPop.textContent=text;
  $comboPop.style.color=color;
  $comboPop.style.cssText+=`;left:50%;top:45%;transform:translate(-50%,-50%);animation:none;`;
  void $comboPop.offsetWidth;
  $comboPop.style.animation='combo-rise .7s ease-out forwards';
}

// ==================== TIMER ====================
function startTimer(ms){
  timerMs=timerMax=ms; lastTimestamp=null;
  if(timerRAF) cancelAnimationFrame(timerRAF);
  function tick(ts){
    if(!lastTimestamp) lastTimestamp=ts;
    timerMs-=ts-lastTimestamp; lastTimestamp=ts;
    if(timerMs<=0){timerMs=0;updateTimerBar();onTimeUp();return;}
    updateTimerBar();
    timerRAF=requestAnimationFrame(tick);
  }
  timerRAF=requestAnimationFrame(tick);
}
function updateTimerBar(){
  const p=Math.max(0,timerMs/timerMax*100);
  $timerBar.style.width=p+'%';
  $timerBar.style.background=p<25?'#f87171':p<50?'#fbbf24':'#22d3ee';
}
function stopTimer(){ if(timerRAF) cancelAnimationFrame(timerRAF); timerRAF=null; }

// ==================== LOAD WORD ====================
function loadNextWord(){
  const entry=pickWord();
  currentWord=entry.r;  // ローマ字（タイプ対象）
  currentJp=entry.w;    // ひらがな（表示）
  currentIdx=0;
  usedWords.push(entry.w);

  $catBadge.textContent=entry.c==='BOSS'?'⚡ BOSS WORD ⚡':entry.c;
  $catBadge.style.color=entry.c==='BOSS'?'#fbbf24':'#4f46e5';
  $catBadge.style.borderColor=entry.c==='BOSS'?'rgba(251,191,36,.3)':'rgba(79,70,229,.2)';
  $catBadge.style.background=entry.c==='BOSS'?'rgba(251,191,36,.08)':'rgba(79,70,229,.1)';

  level=Math.min(Math.floor(wordsTyped/LEVEL_UP_EVERY)+1,10);
  $diffBadge.textContent='LV '+level;
  $counter.textContent='WORD '+(wordsTyped+1)+' / ∞';

  // ひらがな表示アニメ
  $wordJp.textContent=currentJp;
  $wordJp.classList.remove('word-enter');
  void $wordJp.offsetWidth;
  $wordJp.classList.add('word-enter');

  const timeTotal=(BASE_TIME+currentWord.length*TIME_PER_CHAR)*Math.pow(TIME_ACCEL,level-1);
  startTimer(Math.max(timeTotal,1500));
  renderWord(currentWord,0);
  $input.value='';
  $input.focus();

  if(entry.c==='BOSS'){
    document.getElementById('game-wrap').style.animation='boss-pulse 1s ease-in-out';
    setTimeout(()=>document.getElementById('game-wrap').style.animation='',1000);
  }
}

// ==================== GAME OVER ====================
function onTimeUp(){
  stopTimer(); state='over'; $input.blur();
  flashScreen('rgba(248,113,113,.25)');
  spawnParticles('#f87171',12);
  setTimeout(()=>{
    document.getElementById('go-score').textContent=score.toLocaleString();
    document.getElementById('go-words').textContent=wordsTyped;
    document.getElementById('go-combo').textContent=bestCombo+'x';
    document.getElementById('go-level').textContent=level;
    $overScr.style.display='flex';
    $titleScr.style.display='none';
  },400);
}

// ==================== INPUT (ローマ字・即時判定) ====================
$input.addEventListener('input', function(){
  if(state!=='playing') return;
  const val=this.value;

  for(let i=currentIdx; i<val.length && i<currentWord.length; i++){
    if(val[i]===currentWord[i]){
      popLetter(i);   // ← 爽快感：1文字ごとにポップ！
      currentIdx++;
    } else {
      // ミス
      this.value=val.slice(0,currentIdx);
      this.classList.add('wrong-input');
      setTimeout(()=>this.classList.remove('wrong-input'),280);
      const letters=$wordDisp.querySelectorAll('.letter');
      if(letters[currentIdx]){
        letters[currentIdx].classList.add('wrong');
        setTimeout(()=>letters[currentIdx].classList.remove('wrong'),250);
      }
      if(combo>0){ combo=0; updateComboDisplay(); }
      timerMs=Math.max(timerMs-timerMax*0.08,200);
      break;
    }
  }

  renderWord(currentWord,currentIdx);

  if(currentIdx>=currentWord.length) onWordComplete();
});

// ==================== WORD COMPLETE ====================
function onWordComplete(){
  stopTimer(); wordsTyped++;
  combo++; if(combo>bestCombo) bestCombo=combo;

  const color=getComboColor(combo);
  const isBoss=$catBadge.textContent.includes('BOSS');
  const baseScore=currentWord.length*10*level;
  const finalScore=isBoss?Math.floor(baseScore*getComboMult(combo))*BOSS_MULT:Math.floor(baseScore*getComboMult(combo));
  score+=finalScore;

  flashScreen(isBoss?'rgba(251,191,36,.2)':'rgba(74,222,128,.12)');
  spawnParticles(isBoss?'#fbbf24':color, isBoss?16:10);
  if(combo>=3) showComboPopup(isBoss?'⚡ BOSS ×'+BOSS_MULT+'!':getComboLabel(combo), isBoss?'#fbbf24':color);

  updateScoreDisplay();
  updateComboDisplay();
  setTimeout(()=>loadNextWord(),120);
}

// ==================== UI UPDATES ====================
function updateScoreDisplay(){
  $score.textContent=score.toLocaleString();
  $score.style.textShadow='0 0 20px rgba(34,211,238,.6)';
  setTimeout(()=>$score.style.textShadow='',400);
}
function updateComboDisplay(){
  $combo.textContent=getComboLabel(combo);
  $combo.style.color=getComboColor(combo);
  $combo.classList.remove('pop');
  void $combo.offsetWidth;
  $combo.classList.add('pop');
  setTimeout(()=>$combo.classList.remove('pop'),200);
}

// ==================== GAME START / RETRY ====================
function startGame(){
  state='playing'; score=0; combo=0; bestCombo=0; wordsTyped=0; level=1; usedWords=[];
  $titleScr.style.display='none'; $overScr.style.display='none';
  $input.style.display='block';
  updateScoreDisplay(); updateComboDisplay();
  loadNextWord();
}
document.getElementById('btn-start').addEventListener('click', startGame);
document.getElementById('btn-retry').addEventListener('click', ()=>{ $overScr.style.display='none'; startGame(); });

// ==================== SHARE ====================
document.getElementById('btn-share').addEventListener('click', ()=>{
  const text=encodeURIComponent(`TYPE STRIKE — Day003\nスコア: ${score.toLocaleString()}pts\nワード数: ${wordsTyped} / ベストコンボ: ${bestCombo}x\n#100日ゲームチャレンジ #TypeStrike`);
  const url=encodeURIComponent('https://ryo-solo.github.io/100games/Day003_TypingGame.html');
  window.open(`https://x.com/intent/tweet?text=${text}&url=${url}`,'_blank');
});

// ==================== BOSS PULSE CSS ====================
const bossStyle=document.createElement('style');
bossStyle.textContent='@keyframes boss-pulse{0%,100%{box-shadow:0 0 0 0 rgba(251,191,36,.3)}50%{box-shadow:0 0 0 8px rgba(251,191,36,0)}}';
document.head.appendChild(bossStyle);

// ==================== TOUCH / SCROLL ====================
document.addEventListener('touchmove',e=>{if(e.target!==$input)e.preventDefault();},{passive:false});
document.getElementById('game-wrap').addEventListener('click',()=>{ if(state==='playing') $input.focus(); });
</script>
